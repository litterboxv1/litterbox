<!DOCTYPE html>
<html>
<head>
  <title>LitterBox Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* X (Twitter) Dark Mode Color Palette */
    :root {
      --primary: #1d9bf0;
      --bg: #000000;
      --bg-hover: #080808;
      --border: #2f3336;
      --text: #e7e9ea;
      --text-light: #71767b;
      --sidebar-bg: #16181c;
    }
    
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; padding: 0; margin: 0; background: var(--bg); color: var(--text); }
    h1, h2, h3 { margin: 0; }

    /* New Global Header */
    .global-header {
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(12px);
      z-index: 100;
      height: 60px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      box-sizing: border-box;
    }
    .header-nav { display: flex; align-items: center; gap: 32px; }
    .header-logo { font-size: 1.5rem; font-weight: bold; color: var(--text); }
    .header-links { display: flex; gap: 24px; }
    .header-links a { color: var(--text-light); text-decoration: none; font-weight: bold; transition: color 0.2s;}
    .header-links a.active, .header-links a:hover { color: var(--text); }

    .search-bar { width: 300px; background: #202327; border: 1px solid transparent; padding: 10px 20px; border-radius: 9999px; color: var(--text); font-size: 15px; outline: none; transition: background 0.2s, border 0.2s; }
    .search-bar:focus { background: transparent; border: 1px solid var(--primary); }
    
    /* Center the 2-Column Layout */
    .container { display: flex; justify-content: center; max-width: 1050px; margin: 0 auto; }
    
    /* Main Feed Column */
    main { width: 600px; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: 100vh; }
    
    /* Sticky Tab Header (Offset by Global Header) */
    .header-sticky { 
      position: sticky; 
      top: 60px; 
      background: rgba(0,0,0,0.65); 
      backdrop-filter: blur(12px); 
      z-index: 10; 
      padding: 12px 16px; 
      border-bottom: 1px solid var(--border); 
      display: flex; 
      justify-content: center; /* Centered */
      gap: 40px; 
      font-weight: bold;
    }
    .header-tab { color: var(--text-light); cursor: pointer; padding-bottom: 10px; position: relative;}
    .header-tab.active { color: var(--text); }
    .header-tab.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 4px; background: var(--primary); border-radius: 2px; }

    /* Write Review Trigger */
    .write-review-trigger { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; cursor: pointer; transition: background 0.2s; }
    .write-review-trigger:hover { background: var(--bg-hover); }
    .write-input-mock { font-size: 1.2rem; color: var(--text-light); margin-top: 8px; margin-bottom: 12px; }
    .post-btn-small { background: var(--primary); color: white; border: none; padding: 8px 16px; border-radius: 9999px; font-weight: bold; cursor: pointer; float: right; }

    /* Feed Posts */
    .post { padding: 16px; border-bottom: 1px solid var(--border); display: flex; gap: 12px; transition: background 0.2s; cursor: pointer; }
    .post:hover { background: var(--bg-hover); }
    .avatar { width: 40px; height: 40px; background: #333; border-radius: 50%; flex-shrink: 0; }
    .post-content-area { flex-grow: 1; }
    .post-header { margin-bottom: 4px; }
    .username { font-weight: bold; color: var(--text); }
    .movie-title-row { color: var(--text-light); font-size: 0.95em; }
    .movie-link { color: var(--primary); text-decoration: none; }
    .movie-link:hover { text-decoration: underline; }
    .stars-inline { color: #ffd700; font-size: 1.1em;}
    .post-text { font-size: 15px; line-height: 1.4; color: var(--text); white-space: pre-wrap; word-break: break-word;}
    .post-metrics { display: flex; gap: 24px; margin-top: 12px; color: var(--text-light); font-size: 13px; }

    /* Right Sidebar (Pinned & Stretching) */
    aside { 
      width: 350px; 
      padding-left: 30px; 
      padding-top: 20px; 
      position: sticky; 
      top: 60px; 
      height: calc(100vh - 60px); /* Takes remaining height */
      box-sizing: border-box; 
      display: flex; 
      flex-direction: column; 
      padding-bottom: 20px; 
    }
    
    .sidebar-section { background: var(--sidebar-bg); border-radius: 16px; padding: 16px; margin-bottom: 16px; }
    .sidebar-section h3 { margin: 0 0 16px 0; font-size: 1.2rem; font-weight: 800; }
    
    /* Stretches the Leaderboard block */
    .leaderboard-section {
      flex-grow: 1; 
      margin-bottom: 0;
      display: flex;
      flex-direction: column;
    }

    .posters-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .poster-placeholder { aspect-ratio: 2/3; background: #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.8em; text-align: center; }

    .leaderboard-tabs { display: flex; gap: 16px; margin-bottom: 16px; font-size: 0.95em; }
    .leaderboard-tabs span { font-weight: bold; color: var(--text-light); cursor: pointer; }
    .leaderboard-tabs .active { color: var(--text); }
    
    .leaderboard-item { display: flex; gap: 12px; margin-bottom: 16px; }
    .leaderboard-item:last-child { margin-bottom: 0; }

    /* Dark Mode Modal */
    .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(91, 112, 131, 0.4); z-index: 200; justify-content: center; align-items: flex-start; padding-top: 50px; }
    .modal-content { background: var(--bg); width: 100%; max-width: 600px; padding: 16px; border-radius: 16px; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-close { font-size: 1.5rem; cursor: pointer; color: var(--text); background: none; border: none; }
    
    #new-movie-select { background: #202327; color: var(--text); border: none; padding: 14px; border-radius: 8px; width: 100%; font-size: 1rem; margin-bottom: 16px; outline: none; box-sizing: border-box;}
    #input-new { background: var(--bg); color: var(--text); border: none; width: 100%; height: 120px; font-size: 1.2rem; resize: none; outline: none; margin-bottom: 16px; box-sizing: border-box;}
    .modal-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 12px; }
    .btn-large { background: var(--primary); color: white; border: none; padding: 10px 24px; border-radius: 9999px; font-weight: bold; font-size: 1rem; cursor: pointer; }
    
    #debug { background: #fee; color: #c00; padding: 10px; display: none; text-align: center;}
  </style>
</head>
<body>

  <header class="global-header">
    <div class="header-nav">
      <div class="header-logo">🎬 MovieApp</div>
      <nav class="header-links">
        <a href="#" class="active">Home</a>
        <a href="#">Movies</a>
        <a href="#">Profile</a>
      </nav>
    </div>
    <div class="header-search">
      <input type="text" class="search-bar" placeholder="Search">
    </div>
  </header>

  <div id="debug"></div>

  <div class="container">
    <main>
      <div class="header-sticky">
        <div class="header-tab active">Home</div>
        <div class="header-tab">Movies</div>
        <div class="header-tab">Profile</div>
      </div>

      <div class="write-review-trigger" onclick="openModal()">
        <div class="avatar"></div>
        <div style="flex-grow: 1;">
          <div class="write-input-mock">Post a Review</div>
          <div style="border-top: 1px solid var(--border); padding-top: 12px; overflow: hidden;">
             <button class="post-btn-small">Post</button>
          </div>
        </div>
      </div>

      <div id="movies"></div>
    </main>

    <aside>
      <div class="sidebar-section">
        <h3>Recently Watched</h3>
        <div class="posters-grid">
          <div class="poster-placeholder" style="background: #8b0000;">Dune 2</div>
          <div class="poster-placeholder" style="background: #b8860b;">Furiosa</div>
          <div class="poster-placeholder" style="background: #2f4f4f;">Civil War</div>
        </div>
      </div>

      <div class="sidebar-section leaderboard-section">
        <h3>Leaderboard</h3>
        <div class="leaderboard-tabs">
          <span class="active">Absolute Cinema</span>
          <span>Absolute shitpost</span>
        </div>
        
        <div class="leaderboard-item">
          <div class="avatar" style="width: 32px; height: 32px;"></div>
          <div style="font-size: 0.85em;">
            <b style="color: var(--text);">@lft</b><br>
            <span style="color: var(--text-light);">Project Hail Mary | </span><span style="color: #ffd700;">★★★★★</span><br>
            <span style="color: var(--text);">I loved this movie!</span>
          </div>
        </div>
        <div class="leaderboard-item">
          <div class="avatar" style="width: 32px; height: 32px;"></div>
          <div style="font-size: 0.85em;">
            <b style="color: var(--text);">@lft</b><br>
            <span style="color: var(--text-light);">Thrash | </span><span style="color: #ffd700;">★☆☆☆☆</span><br>
            <span style="color: var(--text);">LOL this was awful.</span>
          </div>
        </div>
      </div>
    </aside>
  </div>

  <div class="modal-overlay" id="review-modal">
    <div class="modal-content">
      <div class="modal-header">
        <button class="modal-close" onclick="closeModal()">×</button>
        <button id="post-btn-new" class="btn-large" onclick="addReview()">Post</button>
      </div>
      
      <div style="display: flex; gap: 12px;">
        <div class="avatar"></div>
        <div style="flex-grow: 1;">
          <select id="new-movie-select">
              <option value="" disabled selected>Select a movie...</option>
              </select>
          
          <textarea id="input-new" maxlength="140" placeholder="Write your review here..."></textarea>
          
          <div class="modal-footer">
            <div id="star-rating-new" data-rating="0" style="display: flex; font-size: 1.8em; cursor: pointer; user-select: none;">
                <span id="star-new-1" onclick="setRating('new', 1)" style="color: #2f3336;">☆</span>
                <span id="star-new-2" onclick="setRating('new', 2)" style="color: #2f3336;">☆</span>
                <span id="star-new-3" onclick="setRating('new', 3)" style="color: #2f3336;">☆</span>
                <span id="star-new-4" onclick="setRating('new', 4)" style="color: #2f3336;">☆</span>
                <span id="star-new-5" onclick="setRating('new', 5)" style="color: #2f3336;">☆</span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js?v=20"></script>
</body>
</html>
